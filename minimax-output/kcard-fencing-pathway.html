<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>击剑升学全路径</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap');

:root {
  --black:  #141414;
  --white:  #FAFAF8;
  --accent: #E8C547;
  --gray-light: #E2DFD6;
  --gray-mid:  #C4BEA0;
  --gray-dark: #888888;
  --text-main: #1a1a1a;
  --tag-bg: #F0EDE6;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #e8e5de;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.card {
  width: 800px;
  aspect-ratio: 3/4;
  background: var(--white);
  position: relative;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.10);
}

/* ── 顶部：深黑底 ── */
.hero {
  height: 32%;
  background: var(--black);
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 48px 72px 40px;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent) 60px, transparent 60px);
}

.kicker {
  font-size: 9px;
  letter-spacing: 0.35em;
  color: rgba(255,255,255,0.28);
  text-transform: uppercase;
  font-weight: 400;
  margin-bottom: 14px;
}

.kicker-year {
  position: absolute;
  top: 0;
  right: 0;
  width: 280px;
  height: 160px;
  overflow: visible;
}

.kicker-year-bg {
  position: absolute;
  top: 80px;
  left: 0;
  right: 0;
  height: 80px;
  background: var(--black);
  opacity: 0.85;
}

.kicker-year-num {
  position: absolute;
  top: 20px;
  right: 40px;
  font-family: 'Noto Serif SC', serif;
  font-size: 88px;
  font-weight: 900;
  color: rgba(255,255,255,0.07);
  letter-spacing: -0.02em;
  line-height: 1;
  z-index: 1;
}

.kicker-year-text {
  position: absolute;
  top: 90px;
  right: 40px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 27px;
  font-weight: 700;
  color: rgba(232, 197, 71, 0.55);
  letter-spacing: 0.18em;
  z-index: 2;
  line-height: 1;
}

.hero-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 75px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--white) 0%, #9ca3af 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.05;
  letter-spacing: -0.025em;
  margin-bottom: 16px;
}

.hero-sub {
  font-size: 20px;
  color: rgba(255,255,255,0.50);
  font-weight: 300;
  line-height: 1.65;
  letter-spacing: 0.03em;
  max-width: 560px;
}

/* ── 中部：两栏对比 ── */
.body {
  height: 52%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: stretch;
}

.col {
  padding: 32px 40px;
  display: flex;
  flex-direction: column;
}

.col-left {
  border-right: 1px solid var(--gray-light);
}

.col-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.col-icon {
  width: 42px;
  height: 42px;
  background: var(--black);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 900;
  color: var(--accent);
  flex-shrink: 0;
}

.col-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px;
  font-weight: 900;
  color: var(--text-main);
  line-height: 1.2;
}

.col-subtitle {
  font-size: 11px;
  color: var(--gray-mid);
  letter-spacing: 0.15em;
  margin-top: 2px;
}

.col-content {
  flex: 1;
}

.col-item {
  margin-bottom: 14px;
}

.item-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-main);
  margin-bottom: 4px;
}

.item-text {
  font-size: 13px;
  color: var(--gray-dark);
  line-height: 1.5;
  font-weight: 300;
}

.highlight-box {
  background: var(--tag-bg);
  border-radius: 6px;
  padding: 10px 14px;
  margin-top: 12px;
}

.highlight-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--accent);
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.highlight-text {
  font-size: 13px;
  color: var(--text-main);
  font-weight: 400;
  line-height: 1.4;
}

/* ── 底部：金色引言条 ── */
.quote-bar {
  height: 16%;
  background: var(--accent);
  display: flex;
  align-items: center;
  padding: 0 72px;
  gap: 24px;
}

.quote-mark {
  font-family: 'Noto Serif SC', serif;
  font-size: 52px;
  font-weight: 900;
  color: rgba(0,0,0,0.12);
  line-height: 1;
  flex-shrink: 0;
}

.quote-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--text-main);
  line-height: 1.45;
  font-style: italic;
}

.quote-from {
  margin-left: auto;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 10px;
  color: rgba(0,0,0,0.38);
  font-style: normal;
  font-weight: 400;
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="card">

  <!-- 顶部 -->
  <div class="hero">
    <div class="kicker">升学规划 · 西安击剑</div>
    <div class="hero-title">击剑<br>升学路径</div>
    <div class="hero-sub">两条通道，助力孩子通往优质学校</div>
    <div class="kicker-year">
      <div class="kicker-year-bg"></div>
      <div class="kicker-year-num">2026</div>
      <div class="kicker-year-text">陕西杰森</div>
    </div>
  </div>

  <!-- 中部两栏 -->
  <div class="body">

    <!-- 左栏：教育系统 -->
    <div class="col col-left">
      <div class="col-header">
        <div class="col-icon">01</div>
        <div>
          <div class="col-title">教育系统</div>
          <div class="col-subtitle">特长生通道</div>
        </div>
      </div>
      <div class="col-content">
        <div class="col-item">
          <div class="item-title">参赛比赛</div>
          <div class="item-text">西安市中小学生击剑比赛</div>
        </div>
        <div class="col-item">
          <div class="item-title">主办方</div>
          <div class="item-text">西安市教育局 + 西安市体育局</div>
        </div>
        <div class="col-item">
          <div class="item-title">获得资格</div>
          <div class="item-text">市级比赛前6名</div>
        </div>
        <div class="highlight-box">
          <div class="highlight-label">升学用途</div>
          <div class="highlight-text">小升初、初升高特长生录取<br>最低只需达到普高线60%</div>
        </div>
      </div>
    </div>

    <!-- 右栏：体育系统 -->
    <div class="col">
      <div class="col-header">
        <div class="col-icon">02</div>
        <div>
          <div class="col-title">体育系统</div>
          <div class="col-subtitle">运动员等级通道</div>
        </div>
      </div>
      <div class="col-content">
        <div class="col-item">
          <div class="item-title">参赛比赛</div>
          <div class="item-text">陕西省青少年击剑冠军赛<br>陕西省青少年击剑锦标赛</div>
        </div>
        <div class="col-item">
          <div class="item-title">主办方</div>
          <div class="item-text">陕西省体育局</div>
        </div>
        <div class="col-item">
          <div class="item-title">获得证书</div>
          <div class="item-text">一级/二级运动员等级证书</div>
        </div>
        <div class="highlight-box">
          <div class="highlight-label">升学用途</div>
          <div class="highlight-text">高考体育单招<br>文化线可降30分录取</div>
        </div>
      </div>
    </div>

  </div>

  <!-- 底部金色引言 -->
  <div class="quote-bar">
    <div class="quote-mark">"</div>
    <div class="quote-text">两条通道，不同路径，都能通向理想学校</div>
    <div class="quote-from">— 陕西杰森击剑</div>
  </div>

</div>
</body>
</html>

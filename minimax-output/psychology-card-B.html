<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你也懂点心理学 - 方案B</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'NotoSansSC', sans-serif;
  width: 800px;
  height: 1067px;
  background: #0d1520;
  color: #fafafa;
  overflow: hidden;
  position: relative;
}
.bg-grid {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.top-section {
  height: 342px;
  background: linear-gradient(135deg, #0d1520 0%, #1a2a3a 50%, #0d1520 100%);
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 48px 32px;
}
.top-section::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #00d4ff, #0066aa, #00d4ff);
}
.top-section::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
}
.badge-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  position: relative;
  z-index: 1;
}
.badge {
  background: rgba(0,212,255,0.12);
  border: 1px solid rgba(0,212,255,0.4);
  color: #00d4ff;
  font-size: 13px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
}
.badge-num {
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  font-weight: 600;
}
.series-name {
  font-size: 14px;
  color: rgba(0,212,255,0.6);
  letter-spacing: 3px;
  margin-bottom: 14px;
  font-weight: 600;
}
.main-title {
  font-size: 46px;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}
.main-title .accent {
  color: #00d4ff;
  text-shadow: 0 0 30px rgba(0,212,255,0.3);
}
.sub-title {
  font-size: 21px;
  color: rgba(255,255,255,0.45);
  font-weight: 400;
}
.divider {
  height: 1px;
  background: linear-gradient(90deg, rgba(0,212,255,0.3), transparent);
  margin: 24px 48px;
}
.content {
  padding: 0 48px;
  position: relative;
  z-index: 1;
}
.signal-label {
  font-size: 12px;
  color: rgba(0,212,255,0.7);
  font-weight: 700;
  letter-spacing: 3px;
  margin-bottom: 16px;
}
.cards-row {
  display: flex;
  gap: 14px;
  margin-bottom: 28px;
}
.card {
  flex: 1;
  background: rgba(0,212,255,0.04);
  border: 1px solid rgba(0,212,255,0.12);
  border-radius: 14px;
  padding: 18px 14px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #00d4ff, transparent);
}
.card-num {
  font-size: 10px;
  color: rgba(0,212,255,0.5);
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.card-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 10px;
  color: #fff;
}
.card-body {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
}
.movie-ref {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: rgba(0,212,255,0.06);
  border: 1px solid rgba(0,212,255,0.1);
  border-left: 3px solid #00d4ff;
  border-radius: 0 12px 12px 0;
  margin-bottom: 24px;
}
.movie-icon {
  width: 34px;
  height: 34px;
  background: rgba(0,212,255,0.15);
  border: 1px solid rgba(0,212,255,0.3);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.movie-text {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
}
.movie-text strong {
  color: rgba(0,212,255,0.9);
  font-weight: 600;
}
.quote-box {
  background: rgba(0,212,255,0.03);
  border-radius: 14px;
  padding: 18px 22px;
  margin-bottom: 24px;
  border: 1px solid rgba(0,212,255,0.08);
}
.quote-top {
  font-size: 12px;
  color: #00d4ff;
  font-weight: 700;
  margin-bottom: 8px;
}
.quote-text {
  font-size: 15px;
  color: rgba(255,255,255,0.65);
  line-height: 1.6;
}
.quote-text strong {
  color: #fff;
}
.interact-box {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: rgba(0,212,255,0.07);
  border-radius: 12px;
  border: 1px solid rgba(0,212,255,0.1);
}
.interact-icon {
  font-size: 18px;
}
.interact-text {
  font-size: 12px;
  color: rgba(255,255,255,0.5);
}
.brand {
  position: absolute;
  top: 28px;
  right: 40px;
  text-align: right;
  z-index: 2;
}
.brand-year {
  font-size: 88px;
  font-weight: 900;
  color: rgba(0,212,255,0.04);
  line-height: 1;
  position: absolute;
  top: 0;
  right: 0;
}
.brand-name {
  font-size: 20px;
  font-weight: 700;
  color: #ffd700;
  position: absolute;
  top: 88px;
  right: 0;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="top-section">
  <div class="brand">

  </div>
  <div class="badge-row">
    <span class="badge">DSM-5 系列 · 02</span>

  <div class="movie-ref">
    <div class="movie-icon">🎬</div>
    <div class="movie-text">
      <strong>《消失的爱人》艾米</strong> — 完美契合"对伴侣忠诚的病理性猜疑"

  </div>
  <div class="quote-box">
    <div class="quote-top">小提醒</div>
    <div class="quote-text">
      这不是"在乎"，是认知偏差。<br><strong>健康关系不需要"监控式信任"</strong>
    </div>
  </div>
  <div class="interact-box">
    <div class="interact-icon">💬</div>
    <div class="interact-text">你经历过"被无理由猜疑到窒息"吗？评论区聊聊！</div>
  </div>
</div>

</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识卡片</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap');

:root {
  --black:  #141414;
  --white:  #FAFAF8;
  --accent: #E8C547;
  --gray-light: #E2DFD6;
  --gray-mid:  #C4BEA0;
  --gray-dark: #888888;
  --text-main: #1a1a1a;
  --tag-bg: #F0EDE6;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #e8e5de;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.card {
  width: 800px;
  aspect-ratio: 3/4;
  background: var(--white);
  position: relative;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.10);
}

/* ── 顶部：深黑底 ── */
.hero {
  height: 32%;
  background: var(--black);
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 48px 72px 40px;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent) 60px, transparent 60px);
}

.kicker {
  font-size: 9px;
  letter-spacing: 0.35em;
  color: rgba(255,255,255,0.28);
  text-transform: uppercase;
  font-weight: 400;
  margin-bottom: 14px;
}

.kicker-year {
  position: absolute;
  top: 0;
  right: 0;
  width: 280px;
  height: 160px;
  overflow: visible;
}

.kicker-year-bg {
  position: absolute;
  top: 80px;
  left: 0;
  right: 0;
  height: 80px;
  background: var(--black);
  opacity: 0.85;
}

.kicker-year-num {
  position: absolute;
  top: 20px;
  right: 40px;
  font-family: 'Noto Serif SC', serif;
  font-size: 88px;
  font-weight: 900;
  color: rgba(255,255,255,0.07);
  letter-spacing: -0.02em;
  line-height: 1;
  z-index: 1;
}

.kicker-year-text {
  position: absolute;
  top: 90px;
  right: 40px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 27px;
  font-weight: 700;
  color: rgba(232, 197, 71, 0.55);
  letter-spacing: 0.18em;
  z-index: 2;
  line-height: 1;
}

.hero-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 75px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--white) 0%, #9ca3af 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.05;
  letter-spacing: -0.025em;
  margin-bottom: 16px;
}

.hero-sub {
  font-size: 20px;
  color: rgba(255,255,255,0.50);
  font-weight: 300;
  line-height: 1.65;
  letter-spacing: 0.03em;
  max-width: 560px;
}

/* ── 中部：白色三栏 ── */
.body {
  height: 52%;
  display: grid;
  grid-template-columns: 1fr 1px 1fr 1px 1fr;
  align-items: stretch;
}

.rule { background: var(--gray-light); }

.col {
  padding: 36px 40px;
  display: flex;
  flex-direction: column;
}

.col-num {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}

.col-label {
  font-size: 8px;
  letter-spacing: 0.25em;
  color: var(--gray-mid);
  text-transform: uppercase;
  margin-bottom: 12px;
  font-weight: 400;
}

.col-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-main);
  line-height: 1.3;
  margin-bottom: 10px;
}

.col-text {
  font-size: 20px;
  color: var(--gray-dark);
  line-height: 1.8;
  font-weight: 300;
  flex: 1;
}

.col-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
}

.ctag {
  font-size: 9px;
  letter-spacing: 0.08em;
  color: var(--gray-dark);
  background: var(--tag-bg);
  padding: 3px 9px;
  border-radius: 3px;
}

/* ── 底部：金色引言条 ── */
.quote-bar {
  height: 16%;
  background: var(--accent);
  display: flex;
  align-items: center;
  padding: 0 72px;
  gap: 24px;
}

.quote-mark {
  font-family: 'Noto Serif SC', serif;
  font-size: 52px;
  font-weight: 900;
  color: rgba(0,0,0,0.12);
  line-height: 1;
  flex-shrink: 0;
}

.quote-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--text-main);
  line-height: 1.45;
  font-style: italic;
}

.quote-from {
  margin-left: auto;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 10px;
  color: rgba(0,0,0,0.38);
  font-style: normal;
  font-weight: 400;
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="card">

  <!-- 顶部 -->
  <div class="hero">
    <div class="kicker">体育运动 · 击剑运动</div>
    <div class="hero-title">为什么<br>要学习击剑</div>
    <div class="hero-sub">一项小众运动，为什么值得投入？<br>因为它能重塑一个人的思维方式。</div>
    <div class="kicker-year">
      <div class="kicker-year-bg"></div>
      <div class="kicker-year-num">2006</div>
      <div class="kicker-year-text">陕西杰森</div>
    </div>
  </div>

  <!-- 中部三栏 -->
  <div class="body">

    <div class="col">
      <div class="col-num">01</div>
      <div class="col-label">心智训练</div>
      <div class="col-title">在高压下做出决策</div>
      <div class="col-text">每一次进攻都是判断力的较量——读懂对手，比击中更重要。</div>
      <div class="col-tags">
        <span class="ctag">专注力</span>
        <span class="ctag">决策</span>
      </div>
    </div>

    <div class="rule"></div>

    <div class="col">
      <div class="col-num">02</div>
      <div class="col-label">身体素养</div>
      <div class="col-title">全身协调，优雅发力</div>
      <div class="col-text">击剑是身体的国际象棋——每一步都在计算，每一步都要求精准控制。</div>
      <div class="col-tags">
        <span class="ctag">协调性</span>
        <span class="ctag">爆发力</span>
      </div>
    </div>

    <div class="rule"></div>

    <div class="col">
      <div class="col-num">03</div>
      <div class="col-label">精神品格</div>
      <div class="col-title">输得起，才赢得起</div>
      <div class="col-text">每一次失败都在锻炼心态——真正的对手，是自己。击剑教会你优雅地面对输赢。</div>
      <div class="col-tags">
        <span class="ctag">抗压</span>
        <span class="ctag">体育精神</span>
      </div>
    </div>

  </div>

  <!-- 底部金色引言 -->
  <div class="quote-bar">
    <div class="quote-mark">"</div>
    <div class="quote-text">剑是身体的延伸，思考是剑的延伸。</div>
    <div class="quote-from">— 陕西杰森 · 2026</div>
  </div>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>全球热点</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', Arial, sans-serif;
  background: #ffffff;
  color: #1d1d1f;
  -webkit-font-smoothing: antialiased;
}
.page {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: #ffffff;
}
/* 顶部 */
.top-line {
  height: 3px;
  background: linear-gradient(90deg, #ff375f, #ff9f0a, #bf984b);
  flex-shrink: 0;
}
.header {
  padding: 40px 32px 24px;
  flex-shrink: 0;
}
.label {
  font-size: 13px;
  font-weight: 600;
  color: #86868b;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.title {
  font-size: 48px;
  font-weight: 700;
  color: #1d1d1f;
  letter-spacing: -0.02em;
  line-height: 1.05;
}
/* 内容区 */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 0 32px 40px;
}
/* 卡片 */
.card {
  background: #f5f5f7;
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 16px;
}
.card-alert {
  background: linear-gradient(135deg, #fff5f7, #fff);
  border: 1px solid rgba(255,55,95,0.1);
}
.card-info {
  background: linear-gradient(135deg, #f5f5ff, #fff);
  border: 1px solid rgba(0,122,255,0.08);
}
.card-purple {
  background: linear-gradient(135deg, #faf5ff, #fff);
  border: 1px solid rgba(175,82,222,0.08);
}
.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 16px;
}
.badge-red { background: rgba(255,55,95,0.1); color: #ff375f; }
.badge-blue { background: rgba(0,122,255,0.1); color: #007aff; }
.badge-purple { background: rgba(175,82,222,0.1); color: #af52de; }
.badge-dark { background: rgba(0,0,0,0.05); color: #666; }
.headline {
  font-size: 36px;
  font-weight: 700;
  color: #ff375f;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 12px;
}
.headline-dark {
  font-size: 24px;
  font-weight: 600;
  color: #1d1d1f;
  letter-spacing: -0.01em;
  line-height: 1.2;
  margin-bottom: 10px;
}
.body-text {
  font-size: 17px;
  color: #424245;
  line-height: 1.55;
}
.stat {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-top: 16px;
}
.stat-num {
  font-size: 44px;
  font-weight: 700;
  color: #ff375f;
  letter-spacing: -0.02em;
}
.stat-num-blue { color: #007aff; }
.stat-unit {
  font-size: 14px;
  font-weight: 500;
  color: #86868b;
}
/* 列表 */
.list-row {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.list-row:last-child { border-bottom: none; }
.list-rank {
  font-size: 14px;
  font-weight: 600;
  color: #86868b;
  width: 24px;
  text-align: center;
}
.list-title {
  font-size: 16px;
  font-weight: 500;
  color: #1d1d1f;
  flex: 1;
}
.list-num {
  font-size: 14px;
  font-weight: 600;
  color: #34c759;
}
</style>
</head>
<body>
<div class="page">
  <div class="top-line"></div>
  
  <div class="header">
    <div class="label">2026年4月5日</div>
    <div class="title">全球热点</div>
  </div>
  
  <div class="content">
    <!-- 头条 -->
    <div class="card card-alert">
      <span class="badge badge-red">最高警报</span>
      <div class="headline">美伊 48小时</div>
      <div class="body-text">特朗普发出最后通牒：48小时内达成协议，否则"伊朗将承受一切后果"。霍尔木兹海峡封锁，全球20%石油运输受阻。</div>
      <div class="stat">
        <div class="stat-num">$140+</div>
        <div class="stat-unit">美元/桶</div>
      </div>
    </div>
    
    <!-- 北约 -->
    <div class="card card-purple">
      <span class="badge badge-purple">地缘政治</span>
      <div class="headline-dark">美国考虑退出北约？</div>
      <div class="body-text">特朗普"认真考虑"退出北约。英国首相："这不是我们的战争。"马克龙批评特朗普对伊朗的立场。</div>
    </div>
    
    <!-- NASA -->
    <div class="card card-info">
      <span class="badge badge-blue">太空</span>
      <div class="headline-dark">Artemis II 成功发射</div>
      <div class="body-text">NASA阿尔忒弥斯二号成功发射。50多年来首次载人绕月任务，4名宇航员正在途中。</div>
      <div class="stat">
        <div class="stat-num stat-num-blue">50+</div>
        <div class="stat-unit">年未载人探月</div>
      </div>
    </div>
    
    <!-- 其他热点 -->
    <div class="card">
      <span class="badge badge-dark">热点排行</span>
      <div class="list-row"><div class="list-rank">4</div><div class="list-title">全球股市暴涨</div><div class="list-num">↑</div></div>
      <div class="list-row"><div class="list-rank">5</div><div class="list-title">原油剧烈震荡</div><div class="list-num">↑</div></div>
      <div class="list-row"><div class="list-rank">6</div><div class="list-title">黄金守住4759美元</div><div class="list-num">→</div></div>
      <div class="list-row"><div class="list-rank">7</div><div class="list-title">百度无人驾驶停车</div><div class="list-num">↓</div></div>
      <div class="list-row"><div class="list-rank">8</div><div class="list-title">乌克兰战争</div><div class="list-num">→</div></div>
    </div>
  </div>
</div>
</body>
</html>
